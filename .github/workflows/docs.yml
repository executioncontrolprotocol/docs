# Validate Mintlify docs on push to main. Publishing is done by Mintlify when
# this repo is connected in the Mintlify dashboard and the Mintlify GitHub App
# is installed (https://dashboard.mintlify.com/settings/deployment/git-settings).
# Pushes to main then trigger automatic deploys on Mintlify's hosting.

name: Docs

on:
  push:
    branches: [main]
    paths:
      - "docs.json"
      - "package.json"
      - "**/*.mdx"
      - "**/*.md"
  pull_request:
    branches: [main]
    paths:
      - "docs.json"
      - "package.json"
      - "**/*.mdx"
      - "**/*.md"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    name: Validate documentation
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Validate Mintlify docs
        run: npx mintlify validate

      - name: Check broken links
        run: npx mintlify broken-links
